<!DOCTYPE html>
<html>

<head>
  <title>Fluid Logic Engine</title>
  <script src="./babel.min.js"></script>
</head>

<body style="background: #111; color: #eee; font-family: monospace;">
  <div id="status">Awakening...</div>
  <script>
    const status = (msg) => document.getElementById('status').innerText = `📡 ${msg}`;

    // 1. Sniff GitHub Info
    const pathParts = window.location.pathname.split('/').filter(Boolean);
    const user = window.location.hostname.split('.')[0];
    const repo = pathParts[0] || 'your-repo-name';
    const rawBase = `https://raw.githubusercontent.com/${[user, repo, 'main', ...pathParts.slice(1)].join('/')}`;

    const host = {
      async readFile(path) {
        // Ensure path is relative to src
        const url = path.startsWith('http') ? path : `${rawBase}/${path}?t=${Date.now()}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`Could not find: ${path}`);
        return res.text();
      }
    };

    const VFS = new Map(); // Store compiled code & metadata
    const moduleCache = new Map();

    // 2. The Recursive Compiler
    async function deepCompile(path) {
      if (VFS.has(path)) return;

      status(`Compiling: ${path}`);
      const source = await host.readFile(path);
      const deps = [];
      const ops = opsRuntime();
      const opsModuleText = ops.generateRuntimeText();
      const { code, map } = Babel.transform(source, {
        filename: path,
        presets: ['typescript'],
        sourceMaps: true,
        plugins: [
          ['transform-modules-commonjs', { strictMode: false }],
          ({ types: t }) => ({ // Makes a __require out of imports
            visitor: {
              ImportDeclaration(p) {
                const specifier = p.node.source.value;
                // Basic resolver: assumes relative imports for now
                let resolved = specifier.endsWith('.ts') ? specifier : specifier + '.ts';
                resolved = resolved.replace(/^\.\/?/, 'src/'); // Ensure it points to src/
                deps.push(resolved);

                // Rewrite to sync: const {x} = __require('./lib.ts')
                const variableName = p.node.specifiers[0]?.local.name;
                if (variableName) {
                  p.replaceWith(t.variableDeclaration("const", [
                    t.variableDeclarator(
                      t.identifier(variableName),
                      t.callExpression(t.identifier("__require"), [t.stringLiteral(resolved)])
                    )
                  ]));
                } else {
                  p.replaceWith(t.expressionStatement(
                    t.callExpression(t.identifier("__require"), [t.stringLiteral(resolved)])
                  ));
                }
              }
            }
          }),
          ops.plugin
        ]
      });
      eval(opsModuleText); // Load ops runtime into the environment LOL WHAT A HACK

      // Create the Source Map comment
      const mapBase64 = btoa(JSON.stringify(map));
      const sourceMapComment = `\n//# sourceMappingURL=data:application/json;charset=utf-8;base64,${mapBase64}`;
      const sourceURLComment = `\n//# sourceURL=universe:///${path}`;

      VFS.set(path, {
        code: code + sourceMapComment + sourceURLComment,
        deps
      });
      // VFS.set(path, { code, deps });
      await Promise.all(deps.map(d => deepCompile(d)));
    }

    // 3. The Sync Executor
    function __require(path) {
      if (moduleCache.has(path)) return moduleCache.get(path).exports;

      const module = { exports: {} };
      moduleCache.set(path, module);

      const entry = VFS.get(path);
      if (!entry) throw new Error(`Module ${path} not in VFS!`);

      // Inject sync require into the scope
      const wrapper = new Function('__require', 'exports', 'module', entry.code);
      wrapper(__require, module.exports, module);

      return module.exports;
    }

    async function init() {
      try {
        await deepCompile('src/main.ts');
        status("Universe Incarnated. Running...");
        __require('src/main.ts');
      } catch (e) {
        status(`Error: ${e.message}`);
        console.error(e);
      }
    }

    const opsRuntime = (() => { // OPS TRANSFORM
      const api = {};
      // 1. The Definitive Map (Shared by Transform and Generator)
      const opsMap = {
        binary: {
          '+': 'add', '-': 'sub', '*': 'mul', '/': 'div', '**': 'pow',
          '%': 'mod', '==': 'eq', '===': 'seq', '<': 'lt', '>': 'gt',
          '<=': 'lte', '>=': 'gte', '&': 'bitAnd', '|': 'bitOr',
          '^': 'bitXor', '<<': 'lshift', '>>': 'rshift', '>>>': 'urshift'
        },
        unary: {
          '-': 'neg', '+': 'plus', '!': 'not', '~': 'bitNot'
        },
        update: {
          '++': 'inc', '--': 'dec'
        }
      };
      api.opsMap = opsMap;

      /**
       * 2. The Generator: Produces the actual module text.
       * This is what you save to your VFS as "ops-runtime.js"
       */
      const generateRuntimeText = api.generateRuntimeText = () => {
        const lines = [
          "// Auto-generated Operator Overload Runtime",
          "const ops = {",
          // Binaries: add: (a, b) => a + b
          ...Object.entries(opsMap.binary).map(([op, name]) => `  ${name}: (a, b) => a ${op} b,`),
          // Unaries: neg: (a) => -a
          ...Object.entries(opsMap.unary).map(([op, name]) => `  ${name}: (a) => ${op}a,`),
          // Pre/Post Logic
          `  pre: (op, val, setter) => {
    const res = (op === 'inc') ? val + 1 : val - 1;
    setter(res); return res;
  },
  post: (op, val, setter) => {
    const old = val;
    const res = (op === 'inc') ? val + 1 : val - 1;
    setter(res); return old;
  }`,
          "};",
          "export default ops;",
          "globalThis.ops = ops; // For easy global access"
        ];
        return lines.join('\n');
      };

      /**
       * 3. The Babel Plugin
       */
      api.plugin = function ({ types: t }) {
        return {
          name: "operator-overload-plugin",
          visitor: {
            BinaryExpression(path) {
              const method = opsMap.binary[path.node.operator];
              if (method) {
                path.replaceWith(t.callExpression(
                  t.memberExpression(t.identifier('ops'), t.identifier(method)),
                  [path.node.left, path.node.right]
                ));
              }
            },
            UnaryExpression(path) {
              const method = opsMap.unary[path.node.operator];
              if (method && path.node.prefix !== false) {
                path.replaceWith(t.callExpression(
                  t.memberExpression(t.identifier('ops'), t.identifier(method)),
                  [path.node.argument]
                ));
              }
            },
            UpdateExpression(path) {
              const method = opsMap.update[path.node.operator];
              if (method) {
                const isPost = !path.node.prefix;
                path.replaceWith(t.callExpression(
                  t.memberExpression(t.identifier('ops'), t.identifier(isPost ? 'post' : 'pre')),
                  [
                    t.stringLiteral(method),
                    path.node.argument,
                    t.arrowFunctionExpression(
                      [t.identifier('v')],
                      t.assignmentExpression('=', path.node.argument, t.identifier('v'))
                    )
                  ]
                ));
              }
            }
          }
        };
      }

      return api;
    })


    init();

  </script>
</body>

</html>

<!DOCTYPE html>
<html>

<head>
  <title>Fluid Logic Engine</title>
  <script src="./babel.min.js"></script>
</head>

<body style="background: #111; color: #eee; font-family: monospace;">
  <div id="status">Awakening...</div>
  <script>
    const status = (msg) => document.getElementById('status').innerText = `📡 ${msg}`;

    // 1. Sniff GitHub Info
    const pathParts = window.location.pathname.split('/').filter(Boolean);
    const user = window.location.hostname.split('.')[0];
    const repo = pathParts[0] || 'your-repo-name';
    const rawBase = `https://raw.githubusercontent.com/${[user, repo, 'main', ...pathParts.slice(1)].join('/')}`;

    const host = {
      async readFile(path) {
        // Ensure path is relative to src
        const url = path.startsWith('http') ? path : `${rawBase}/${path}?t=${Date.now()}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`Could not find: ${path}`);
        return res.text();
      }
    };

    const VFS = new Map(); // Store compiled code & metadata
    const moduleCache = new Map();

    // Helper to resolve paths like "./utils" -> "src/utils.ts"
    const resolvePath = (base, specifier) => {
      let res = specifier.startsWith('.') ? 
        new URL(specifier, `http://v/src/${base.replace('src/', '')}`).pathname.slice(1) : 
        specifier;
      return res.endsWith('.ts') ? res : res + '.ts';
    };

    // --- OPERATOR OVERLOAD GENERATOR ---
    const ops = (() => {
      const opsMap = {
        binary: {
          '+': 'add', '-': 'sub', '*': 'mul', '/': 'div', '**': 'pow',
          '%': 'mod', '==': 'eq', '===': 'seq', '<': 'lt', '>': 'gt',
          '<=': 'lte', '>=': 'gte', '&': 'bitAnd', '|': 'bitOr',
          '^': 'bitXor', '<<': 'lshift', '>>': 'rshift', '>>>': 'urshift'
        },
        unary: { '-': 'neg', '+': 'plus', '!': 'not', '~': 'bitNot' },
        update: { '++': 'inc', '--': 'dec' }
      };

      return {
        generateRuntimeText: () => `
          globalThis.ops = {
            ${Object.entries(opsMap.binary).map(([op, name]) => `${name}: (a, b) => a ${op} b,`).join('\n')}
            ${Object.entries(opsMap.unary).map(([op, name]) => `${name}: (a) => ${op}a,`).join('\n')}
            pre: (op, val, setter) => {
              const res = (op === 'inc') ? val + 1 : val - 1;
              setter(res); return res;
            },
            post: (op, val, setter) => {
              const old = val;
              const res = (op === 'inc') ? val + 1 : val - 1;
              setter(res); return old;
            }
          };`,
        plugin: ({ types: t }) => ({
          visitor: {
            BinaryExpression(p) {
              const m = opsMap.binary[p.node.operator];
              if (m) p.replaceWith(t.callExpression(t.memberExpression(t.identifier('ops'), t.identifier(m)), [p.node.left, p.node.right]));
            },
            UnaryExpression(p) {
              const m = opsMap.unary[p.node.operator];
              if (m && p.node.prefix !== false) p.replaceWith(t.callExpression(t.memberExpression(t.identifier('ops'), t.identifier(m)), [p.node.argument]));
            },
            UpdateExpression(p) {
              const m = opsMap.update[p.node.operator];
              if (m) {
                const isPost = !p.node.prefix;
                p.replaceWith(t.callExpression(t.memberExpression(t.identifier('ops'), t.identifier(isPost ? 'post' : 'pre')), [
                  t.stringLiteral(m), p.node.argument,
                  t.arrowFunctionExpression([t.identifier('v')], t.assignmentExpression('=', p.node.argument, t.identifier('v')))
                ]));
              }
            }
          }
        })
      };
    })();

    // Initialize Runtime once
    new Function(ops.generateRuntimeText())();

    async function deepCompile(path) {
      if (VFS.has(path)) return;

      status(`Compiling: ${path}`);
      const source = await host.readFile(path);
      const deps = [];

      const { code, map } = Babel.transform(source, {
        filename: path,
        presets: ['typescript'],
        sourceMaps: true,
        plugins: [
          ['transform-modules-commonjs', { strictMode: false }],
          ({ types: t }) => ({
            visitor: {
              ImportDeclaration(p) {
                const resolved = resolvePath(path, p.node.source.value);
                deps.push(resolved);
                const varName = p.node.specifiers[0]?.local.name;
                p.replaceWith(varName ? 
                  t.variableDeclaration("const", [t.variableDeclarator(t.identifier(varName), t.callExpression(t.identifier("__require"), [t.stringLiteral(resolved)]))]) :
                  t.expressionStatement(t.callExpression(t.identifier("__require"), [t.stringLiteral(resolved)]))
                );
              }
            }
          }),
          ops.plugin
        ]
      });

      const mapBase64 = btoa(JSON.stringify(map));
      VFS.set(path, {
        code: `${code}\n//# sourceMappingURL=data:application/json;base64,${mapBase64}\n//# sourceURL=universe:///${path}`,
        deps
      });

      await Promise.all(deps.map(d => deepCompile(d)));
    }

    function __require(path) {
      if (moduleCache.has(path)) return moduleCache.get(path).exports;
      const module = { exports: {} };
      moduleCache.set(path, module);
      const entry = VFS.get(path);
      if (!entry) throw new Error(`Module ${path} not found`);
      new Function('__require', 'exports', 'module', entry.code)(__require, module.exports, module);
      return module.exports;
    }

    async function init() {
      try {
        await deepCompile('src/main.ts');
        status("Universe Incarnated. Running...");
        __require('src/main.ts');
      } catch (e) {
        status(`Error: ${e.message}`);
        console.error(e);
      }
    }

    init();
  </script>
</body>
</html>
